<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="t-rear">
  <title id="t-rear">Octatrack MK1 — rear connectors (1:1 with official manual)</title>

  <defs>
    <style>
      .chassis    { fill: #1A1A1A; stroke: #0A0A0A; stroke-width: 1; }
      .top-strip  { fill: #2A2520; }
      .knob-stub  { fill: #3A352F; }
      .jack       { fill: #15110D; stroke: #1A1A1A; stroke-width: 0.4; }
      .jack-ring  { fill: none; stroke: #F4EFE5; stroke-width: 0.6; }
      .midi-jack  { fill: #15110D; stroke: #3A352F; stroke-width: 0.4; }
      .midi-pin   { fill: #F4EFE5; }
      .cf-slot    { fill: #15110D; }
      .cf-card    { fill: #BA2A1C; }
      .pwr-rocker { fill: #C8C2B4; stroke: #1A1A1A; stroke-width: 0.5; }
      .pwr-bg     { fill: #15110D; stroke: #4A4438; stroke-width: 0.5; }
      .usb-port   { fill: #15110D; stroke: #4A4438; stroke-width: 0.4; }

      .label       { font-family: 'Inter', sans-serif; font-size: 8.5px; font-weight: 700;
                     fill: #F4EFE5; text-anchor: middle; letter-spacing: 0.04em; }
      .label-small { font-family: 'Inter', sans-serif; font-size: 7px; font-weight: 600;
                     fill: #F4EFE5; text-anchor: middle; letter-spacing: 0.04em; }
      .label-tiny  { font-family: 'Inter', sans-serif; font-size: 5.5px; font-weight: 600;
                     fill: #BBB5AB; text-anchor: middle; letter-spacing: 0.04em; }
      .group-label { font-family: 'Inter', sans-serif; font-size: 7.5px; font-weight: 700;
                     fill: #F4EFE5; text-anchor: middle; letter-spacing: 0.06em; }
      .logo-elektron  { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 800;
                        fill: #F4EFE5; letter-spacing: -0.01em; }
      .logo-octatrack { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800;
                        fill: #BA2A1C; letter-spacing: 0.01em; }

      .callout-line   { stroke: #C84A1A; stroke-width: 1.0; }
      .callout-circle { fill: #C84A1A; stroke: none; }
      .callout-num    { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 700;
                        fill: #FBF8F1; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background panel -->
  <rect class="chassis" x="40" y="130" width="1120" height="140" rx="2"/>

  <!-- Top strip (chassis edge with knob stubs from front panel) -->
  <rect class="top-strip" x="40" y="100" width="1120" height="32" rx="1"/>

  <!-- knob stubs (visible from rear: bases of front-panel knobs) -->
  <g>
    <rect class="knob-stub" x="105" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="190" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="265" y="92" width="14" height="12" rx="2"/>
    <rect class="knob-stub" x="290" y="92" width="14" height="12" rx="2"/>
    <rect class="knob-stub" x="320" y="92" width="14" height="12" rx="2"/>
    <rect class="knob-stub" x="780" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="850" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="930" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="1010" y="92" width="22" height="14" rx="3"/>
    <rect class="knob-stub" x="1080" y="92" width="22" height="14" rx="3"/>
  </g>

  <!-- Logos -->
  <text class="logo-elektron" x="80" y="155" text-anchor="start">elektron</text>

  <!-- OCTATRACK logo: OT mark + text, positioned side by side -->
  <g transform="translate(285, 152)">
    <circle cx="0"  cy="0" r="7"   fill="#F4EFE5"/>
    <circle cx="16" cy="0" r="5"   fill="#F4EFE5"/>
    <circle cx="16" cy="0" r="1.8" fill="#1A1A1A"/>
    <circle cx="26" cy="5" r="2"   fill="#BA2A1C"/>
    <text class="logo-octatrack" x="36" y="5" text-anchor="start">OCTATRACK</text>
  </g>

  <!-- =============================== -->
  <!-- 1. Power switch (rocker)        -->
  <!-- =============================== -->
  <g transform="translate(80, 215)">
    <rect class="pwr-bg" x="-13" y="-17" width="26" height="34" rx="2"/>
    <rect class="pwr-rocker" x="-9" y="-13" width="18" height="26" rx="1.5"/>
    <text x="0" y="-4" font-family="Inter, sans-serif" font-size="6.5" font-weight="800"
          fill="#1A1A1A" text-anchor="middle">O</text>
    <text x="0" y="9" font-family="Inter, sans-serif" font-size="8" font-weight="800"
          fill="#1A1A1A" text-anchor="middle">|</text>
    <text class="label" y="32">POWER</text>
  </g>

  <!-- =============================== -->
  <!-- 2. 6V DC barrel jack            -->
  <!-- =============================== -->
  <g transform="translate(160, 215)">
    <circle class="jack" r="13"/>
    <circle r="6" fill="#0A0A0A" stroke="#3A352F" stroke-width="0.5"/>
    <circle r="2" fill="#3A352F"/>
    <text class="label" y="32">6VDC 3A</text>
    <g transform="translate(0, 42)">
      <circle cx="-7" cy="0" r="2.2" fill="none" stroke="#BBB5AB" stroke-width="0.5"/>
      <text x="-7" y="2" font-size="3.5" fill="#BBB5AB" text-anchor="middle">─</text>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#BBB5AB" stroke-width="0.5"/>
      <circle cx="7" cy="0" r="2.2" fill="none" stroke="#BBB5AB" stroke-width="0.5"/>
      <text x="7" y="2.3" font-size="3.5" fill="#BBB5AB" text-anchor="middle">+</text>
    </g>
  </g>

  <!-- =============================== -->
  <!-- 3. USB-B                        -->
  <!-- =============================== -->
  <g transform="translate(240, 215)">
    <rect class="usb-port" x="-10" y="-7" width="20" height="14" rx="0.6"/>
    <rect x="-7" y="-4" width="14" height="2.5" fill="#3A352F"/>
    <rect x="-5" y="0" width="10" height="3" fill="#1A1A1A" stroke="#3A352F" stroke-width="0.3"/>
    <text class="label" y="32">USB</text>
  </g>

  <!-- =============================== -->
  <!-- 4. Compact Flash slot           -->
  <!-- =============================== -->
  <g transform="translate(385, 215)">
    <rect class="cf-slot" x="-75" y="-11" width="150" height="22" rx="1.5"/>
    <rect class="cf-card" x="-72" y="-7" width="144" height="11"/>
    <rect x="73" y="-7" width="3" height="14" fill="#3A352F"/>
    <text class="label" y="32">COMPACT FLASH</text>
  </g>

  <!-- =============================== -->
  <!-- 5/6/7. MIDI Thru, Out, In       -->
  <!-- 5-pin DIN: standard MIDI/DIN-5/180 pin pattern -->
  <!-- =============================== -->
  <g transform="translate(560, 215)">
    <!-- THRU -->
    <g>
      <circle class="midi-jack" r="14"/>
      <circle r="9.5" fill="none" stroke="#3A352F" stroke-width="0.5"/>
      <circle class="midi-pin" cx="-6"   cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="6"    cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="-3.5" cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="3.5"  cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="0"    cy="2.5"  r="1.4"/>
      <rect x="-2" y="9" width="4" height="2" fill="#0A0A0A"/>
      <text class="label-small" x="0" y="-22">THRU</text>
    </g>
    <!-- OUT -->
    <g transform="translate(60, 0)">
      <circle class="midi-jack" r="14"/>
      <circle r="9.5" fill="none" stroke="#3A352F" stroke-width="0.5"/>
      <circle class="midi-pin" cx="-6"   cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="6"    cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="-3.5" cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="3.5"  cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="0"    cy="2.5"  r="1.4"/>
      <rect x="-2" y="9" width="4" height="2" fill="#0A0A0A"/>
      <text class="label-small" x="0" y="-22">OUT</text>
    </g>
    <!-- IN -->
    <g transform="translate(120, 0)">
      <circle class="midi-jack" r="14"/>
      <circle r="9.5" fill="none" stroke="#3A352F" stroke-width="0.5"/>
      <circle class="midi-pin" cx="-6"   cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="6"    cy="-2"   r="1.4"/>
      <circle class="midi-pin" cx="-3.5" cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="3.5"  cy="-5.5" r="1.4"/>
      <circle class="midi-pin" cx="0"    cy="2.5"  r="1.4"/>
      <rect x="-2" y="9" width="4" height="2" fill="#0A0A0A"/>
      <text class="label-small" x="0" y="-22">IN</text>
    </g>
    <text class="group-label" x="60" y="32">MIDI</text>
  </g>

  <!-- =============================== -->
  <!-- 8/9. Inputs (2x2 grid: C/A top, D/B bottom) -->
  <!-- =============================== -->
  <g transform="translate(770, 195)">
    <text class="label-small" x="0"  y="-22">C</text>
    <text class="label-small" x="40" y="-22">A</text>

    <g><circle class="jack" r="10"/><circle class="jack-ring" r="7"/><circle r="2.2" fill="#F4EFE5"/></g>
    <g transform="translate(40, 0)"><circle class="jack" r="10"/><circle class="jack-ring" r="7"/><circle r="2.2" fill="#F4EFE5"/></g>
    <g transform="translate(0, 40)"><circle class="jack" r="10"/><circle class="jack-ring" r="7"/><circle r="2.2" fill="#F4EFE5"/></g>
    <g transform="translate(40, 40)"><circle class="jack" r="10"/><circle class="jack-ring" r="7"/><circle r="2.2" fill="#F4EFE5"/></g>

    <text class="label-tiny" x="20" y="22">INPUTS</text>

    <text class="label-small" x="0"  y="59">D</text>
    <text class="label-small" x="40" y="59">B</text>
  </g>

  <!-- =============================== -->
  <!-- 10. CUE OUT (L top, R bottom)   -->
  <!-- =============================== -->
  <g transform="translate(880, 195)">
    <text class="group-label" x="0" y="-22">CUE OUT</text>
    <g>
      <circle class="jack" r="10"/>
      <circle class="jack-ring" r="7"/>
      <circle r="2.2" fill="#F4EFE5"/>
      <text class="label-small" x="-16" y="3">L</text>
    </g>
    <g transform="translate(0, 40)">
      <circle class="jack" r="10"/>
      <circle class="jack-ring" r="7"/>
      <circle r="2.2" fill="#F4EFE5"/>
      <text class="label-small" x="-16" y="3">R</text>
    </g>
    <text class="group-label" x="0" y="60">CUE OUT</text>
  </g>

  <!-- =============================== -->
  <!-- 11. MAIN OUT (L top, R bottom)  -->
  <!-- =============================== -->
  <g transform="translate(960, 195)">
    <text class="group-label" x="0" y="-22">MAIN OUT</text>
    <g>
      <circle class="jack" r="10"/>
      <circle class="jack-ring" r="7"/>
      <circle r="2.2" fill="#F4EFE5"/>
      <text class="label-small" x="16" y="3">L</text>
    </g>
    <g transform="translate(0, 40)">
      <circle class="jack" r="10"/>
      <circle class="jack-ring" r="7"/>
      <circle r="2.2" fill="#F4EFE5"/>
      <text class="label-small" x="16" y="3">R</text>
    </g>
    <text class="group-label" x="0" y="60">MAIN OUT</text>
  </g>

  <!-- =============================== -->
  <!-- 12. Headphones (larger 1/4" stereo jack) -->
  <!-- =============================== -->
  <g transform="translate(1080, 215)">
    <circle class="jack" r="15"/>
    <circle r="10" fill="none" stroke="#F4EFE5" stroke-width="0.6"/>
    <circle r="3.5" fill="#F4EFE5"/>
    <text class="label" y="32">HEADPHONES</text>
  </g>

  <!-- =============================== -->
  <!-- CALLOUTS (1-12) -->
  <!-- =============================== -->
  <g>
    <line class="callout-line" x1="80"  y1="245" x2="80"  y2="320"/>
    <circle class="callout-circle" cx="80"  cy="328" r="9"/>
    <text class="callout-num" x="80" y="331">1</text>

    <line class="callout-line" x1="160" y1="245" x2="160" y2="320"/>
    <circle class="callout-circle" cx="160" cy="328" r="9"/>
    <text class="callout-num" x="160" y="331">2</text>

    <line class="callout-line" x1="240" y1="245" x2="240" y2="320"/>
    <circle class="callout-circle" cx="240" cy="328" r="9"/>
    <text class="callout-num" x="240" y="331">3</text>

    <line class="callout-line" x1="385" y1="245" x2="385" y2="320"/>
    <circle class="callout-circle" cx="385" cy="328" r="9"/>
    <text class="callout-num" x="385" y="331">4</text>

    <line class="callout-line" x1="560" y1="245" x2="560" y2="320"/>
    <circle class="callout-circle" cx="560" cy="328" r="9"/>
    <text class="callout-num" x="560" y="331">5</text>

    <line class="callout-line" x1="620" y1="245" x2="620" y2="320"/>
    <circle class="callout-circle" cx="620" cy="328" r="9"/>
    <text class="callout-num" x="620" y="331">6</text>

    <line class="callout-line" x1="680" y1="245" x2="680" y2="320"/>
    <circle class="callout-circle" cx="680" cy="328" r="9"/>
    <text class="callout-num" x="680" y="331">7</text>

    <line class="callout-line" x1="770" y1="245" x2="770" y2="320"/>
    <circle class="callout-circle" cx="770" cy="328" r="9"/>
    <text class="callout-num" x="770" y="331">8</text>

    <line class="callout-line" x1="810" y1="245" x2="810" y2="320"/>
    <circle class="callout-circle" cx="810" cy="328" r="9"/>
    <text class="callout-num" x="810" y="331">9</text>

    <line class="callout-line" x1="880" y1="245" x2="880" y2="320"/>
    <circle class="callout-circle" cx="880" cy="328" r="9"/>
    <text class="callout-num" x="880" y="331">10</text>

    <line class="callout-line" x1="960" y1="245" x2="960" y2="320"/>
    <circle class="callout-circle" cx="960" cy="328" r="9"/>
    <text class="callout-num" x="960" y="331">11</text>

    <line class="callout-line" x1="1080" y1="245" x2="1080" y2="320"/>
    <circle class="callout-circle" cx="1080" cy="328" r="9"/>
    <text class="callout-num" x="1080" y="331">12</text>
  </g>

  <text x="1160" y="370" font-family="Inter, sans-serif" font-size="7"
        font-weight="600" fill="#6B635A" letter-spacing="0.18em" text-anchor="end">
    OCTATRACK · MK1 · REAR PANEL
  </text>
</svg>
